<VirtualHost *:80>
    ServerName www.botson.org
    ServerAlias botson.org

    DocumentRoot /var/www/botsonorg

    ErrorLog /var/www/botsonorg/logs/error.log
    CustomLog /var/www/botsonorg/logs/access.log combined

    <Directory /var/www/botsonorg>
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
