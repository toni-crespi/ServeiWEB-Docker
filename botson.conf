<VirtualHost *:80>
    ServerName www.botson.com
    ServerAlias aplicacio.botson.com
    ServerAdmin admin@botson.com
    DocumentRoot /var/www/botson
    ErrorDocument 404 "Error en l'aplicacio web botson fitxer no trobat"
    Alias /imatges /srv/www/botson/imatges

    <Directory /var/www/botson>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <Directory /srv/www/botson/imatges>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog /var/www/botson/logs/error.log
    CustomLog /var/www/botson/logs/access.log combined
</VirtualHost>